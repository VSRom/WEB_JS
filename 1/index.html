<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"> 

</head>
<body>
<script>
    // Первое задание
    const a1 = 5 + 3;
    const a2 = 5 - 3;
    const a3 = 5 * 3;
    const a4 = 5 / 3;

    console.log("Переменная a1 === ",a1);
    console.log("Переменная a2 === ",a2);
    console.log("Переменная a3 === ",a3);
    console.log("Переменная a4 === ",a4);

    // Второе задание
    const a6 = 5 % 3;
    const a7 = 3 % 5;
    const a8 = 5 + '3';
    const a9 = '5' - 3;
    const a10 = 75 + 'кг';

    console.log("Переменная a6 === ",a6);
    console.log("Переменная a7 === ",a7);
    console.log("Переменная a8 === ",a8);
    console.log("Переменная a9 === ",a9);
    console.log("Переменная a10 === ",a10);

    // Третье задание
    let x = +prompt("Введите значение переменной x:");

    const y = 7 * x**2 + 3 * x + 6;

    alert("Уравнение поиска y === " + y + "\n");

    // Четвертое задание
    let amount = +prompt("Введите количество жителей в государстве");
    let territory = +prompt("Введите площадь территории государства");

    const result = amount / territory;

    document.write("Плотность населения государства === " + result + "<br>");

    // Пятое задание
        let a = +prompt("Введите значение стороны прямоугольника A");
        let b = +prompt("Введите значение стороны прямоугольника B");

        const S = a * b;
        const P = 2 * (a + b);

        document.write("Площадь прямоугольника === " + S + "<br>");
        document.write("Периметр прямоугольника === " + P + "<br>");





</script>

</body>
